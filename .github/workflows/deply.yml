name: GitHub Pages
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:

  deploy:
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: wirte

    publish:
      runs-on: ubuntu-latest
      steps:
        - name: Deploy to GitHub Pages
          uses: actions/deploy-pages@v4
